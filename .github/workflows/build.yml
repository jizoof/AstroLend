name: Build Contracts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build contracts
        run: |
          cd contracts
          
          # Build oracle first
          cargo build --target wasm32-unknown-unknown --release -p astrolend-price-oracle
          
          # Build interest model
          cargo build --target wasm32-unknown-unknown --release -p astrolend-interest-rate-model
          
          # Build pool last
          cargo build --target wasm32-unknown-unknown --release -p astrolend-pool