- name: Build contracts
  run: |
    cd contracts

    # Build oracle first
    cargo build --target wasm32-unknown-unknown --release -p astrolend-price-oracle

    # Build interest model
    cargo build --target wasm32-unknown-unknown --release -p astrolend-interest-rate-model

    # Now build pool (oracle wasm exists)
    cargo build --target wasm32-unknown-unknown --release -p astrolend-pool