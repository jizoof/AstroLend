name: Build Contracts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32v1-none
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli

      - name: Build contracts
        run: |
          cd contracts

          # Create build folder
          mkdir -p build

          # Build oracle → output goes into build/
          cd price_oracle
          soroban contract build --out-dir ../build
          cd ..

          # Rename the wasm to a fixed name
          ORACLE_WASM=$(ls build/*.wasm | head -n 1)
          echo "Found: $ORACLE_WASM"
          mv "$ORACLE_WASM" build/oracle.wasm

          # Verify
          ls -la build

          # Build pool
          cd pool
          soroban contract build