name: Build Contracts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32v1-none
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev

      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli

      - name: Build contracts
        run: |
          cd contracts

          # Build oracle
          cd price_oracle
          soroban contract build

          # Copy the exact known output
          cp target/wasm32v1-none/release/astrolend_price_oracle.wasm ../oracle.wasm || cp target/wasm32v1-none/release/deps/*.wasm ../oracle.wasm
          cd ..

          # Build pool
          cd pool
          soroban contract build